{{define "title"}}Verify · Omni Identity{{end}}
{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    {{template "omni-brand" .}}
    <div class="panel">
      <h1>Two-step verification</h1>
      <p class="muted">Enter the 6-digit code from your authenticator app, or a recovery code.</p>
      {{if .Error}}<div class="alert error" style="margin-top:14px">{{.Error}}</div>{{end}}
      <form class="stack" method="post" action="/login/mfa">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <label class="field">Verification code
          <input name="code" inputmode="numeric" autocomplete="one-time-code" autofocus required>
        </label>
        <button class="btn primary block" type="submit">Verify</button>
      </form>
      <p class="muted" style="margin-top:16px"><a href="/login">Back to sign in</a></p>
    </div>
    {{template "omni-footer" .}}
  </div>
</div>
{{end}}
