{{define "title"}}Set your password · Omni Identity{{end}}
{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    {{template "omni-brand" .}}
    <div class="panel">
      <h1>Set your password</h1>
      <p class="muted">Choose a password for your account.</p>
      {{if .Policy}}<p class="t-caption" style="margin-top:8px">Must include {{.Policy}}.</p>{{end}}
      {{if .Error}}<div class="alert error" style="margin-top:14px">{{.Error}}</div>{{end}}
      <form class="stack" method="post" action="/set-password">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <input type="hidden" name="token" value="{{.Token}}">
        <label class="field">New password
          <input name="password" type="password" autocomplete="new-password" autofocus required>
        </label>
        <label class="field">Confirm password
          <input name="confirm" type="password" autocomplete="new-password" required>
        </label>
        <button class="btn primary block" type="submit">Set password</button>
      </form>
    </div>
    {{template "omni-footer" .}}
  </div>
</div>
{{end}}
