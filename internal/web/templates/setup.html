{{define "title"}}First-run setup · Omni Identity{{end}}
{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    {{template "omni-brand" .}}
    <div class="panel">
      <h1>Welcome</h1>
      <p class="muted">Create the first administrator account to get started.</p>
      {{if .Error}}<div class="alert error" style="margin-top:14px">{{.Error}}</div>{{end}}
      <form class="stack" method="post" action="/setup">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <label class="field">Username
          <input name="username" value="{{.Username}}" autocomplete="username" autofocus required>
        </label>
        <label class="field">Email
          <input name="email" type="email" value="{{.Email}}" autocomplete="email" required>
        </label>
        <label class="field">Password
          <input name="password" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <button class="btn primary block" type="submit">Create admin &amp; sign in</button>
      </form>
    </div>
    {{template "omni-footer" .}}
  </div>
</div>
{{end}}
