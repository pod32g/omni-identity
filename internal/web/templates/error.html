{{define "title"}}Error · Omni Identity{{end}}
{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    {{template "omni-brand" .}}
    <div class="panel">
      <h1>Something went wrong</h1>
      <div class="alert error" style="margin-top:14px">{{.Message}}</div>
      <p class="muted" style="margin-top:16px"><a href="/login">Return to sign in</a></p>
    </div>
    {{template "omni-footer" .}}
  </div>
</div>
{{end}}
