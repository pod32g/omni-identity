# Omni Identity configuration.
# Copy to config.yaml and adjust. Any value can be overridden by an environment
# variable, e.g. OMNI_SERVER_PORT, OMNI_DATABASE_PATH, OMNI_SECURITY_ISSUER,
# OMNI_COOKIES_SECURE, OMNI_SETUP_TOKEN, OMNI_METRICS_TOKEN,
# OMNI_SECURITY_RATE_LIMIT_WINDOW, OMNI_UPLOADS_MAX_LOGO_BYTES.

server:
  host: 0.0.0.0
  port: 8080
  # Public base URL clients use to reach this server. Required.
  public_url: https://identity.omni.local
  # Non-loopback http:// public URLs are rejected unless this is true. Use only
  # for local development or tightly controlled private testing.
  allow_insecure_http: false
  read_header_timeout: 10s
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 1048576

database:
  # driver: sqlite (default, single-binary) or postgres (HA / multi-instance).
  driver: sqlite
  # SQLite database file (used when driver = sqlite).
  path: ./omni-identity.db
  # Postgres connection URL (used when driver = postgres), e.g.
  #   postgres://user:pass@db-host:5432/omni?sslmode=require
  # Or set OMNI_DATABASE_DRIVER=postgres and OMNI_DATABASE_URL=...
  url: ""

security:
  # Defaults to public_url if omitted.
  issuer: https://identity.omni.local
  # Required for first-run setup when public_url is not loopback. Set a
  # high-entropy one-time value and enter it on the setup form.
  setup_token: ""
  token_ttl: 15m
  refresh_token_ttl: 720h
  # Account protection.
  max_failed_logins: 5
  lockout_duration: 15m
  # Abuse controls for login, MFA, and forgot-password routes.
  rate_limit_window: 15m
  login_ip_max_attempts: 20
  password_verify_concurrency: 4
  max_login_username_bytes: 320
  max_login_password_bytes: 1024
  allow_loopback_http_redirects: true
  password_min_length: 12
  require_upper: false
  require_lower: false
  require_number: true
  require_symbol: false
  session_lifetime: 12h
  # session_idle_timeout: 30m   # 0/unset disables idle expiry

cookies:
  # Must be true for https:// public_url. Set false only for local http:// dev.
  secure: true

metrics:
  # Empty disables /metrics. Set a strong value and scrape with
  # Authorization: Bearer <token>.
  bearer_token: ""

uploads:
  # Branding logos are raster-only PNG/JPEG/WebP.
  max_logo_bytes: 524288

smtp:
  # Optional. When host + from are set, self-service "Forgot password?" is
  # enabled on the login page. Credentials live here (config/env), never in the
  # web-editable settings. Also OMNI_SMTP_HOST / _PORT / _USERNAME / _PASSWORD /
  # _FROM / _STARTTLS.
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""
  starttls: true

ldap:
  # Optional LDAP / Active Directory authentication backend. When enabled, users
  # sign in on the hosted login page with their directory credentials; Omni binds
  # to verify them (search-then-bind) and just-in-time provisions a local mirror
  # account. Omni's TOTP MFA still applies to directory users who enroll it.
  # The bind password is a secret: it lives here (config/env) only, never in the
  # web-editable settings. All keys override via OMNI_LDAP_* env vars.
  enabled: false
  # Schema preset filling in standard filters/attributes: openldap | activedirectory.
  preset: openldap
  url: ldaps://dc1.example.com:636        # ldap:// or ldaps://
  start_tls: false                        # upgrade a ldap:// connection to TLS
  # Service account used to search for the user entry. Empty => anonymous search.
  bind_dn: "cn=svc-omni,ou=svc,dc=example,dc=com"
  bind_password: ""                       # SECRET
  base_dn: "ou=people,dc=example,dc=com"
  # Members of this group become Omni admins (re-evaluated on each login). Empty
  # => no LDAP-granted admins.
  admin_group_dn: "cn=omni-admins,ou=groups,dc=example,dc=com"
  # Filters/attributes below default from the preset; set them only to override:
  user_filter: ""                         # must contain %s (the username)
  attr_username: ""
  attr_email: ""
  attr_display_name: ""
  group_filter: ""                        # %s = the user DN
  ca_cert_file: ""                        # PEM bundle for a private CA
  insecure_skip_verify: false             # labs only — never in production
  timeout: 10s
  # Write management: let admins create, edit, delete, and set passwords for
  # directory users from the Users page. The directory stays the source of truth
  # (Omni issues LDAP Add/Modify/Delete/PasswordModify). Requires a bind_dn with
  # write permission. This value only *seeds* the live toggle under Admin →
  # Settings → Directory management (which can flip it without a restart). Off by
  # default. Also OMNI_LDAP_MANAGE_ENABLED / _PEOPLE_BASE_DN / _RDN_ATTR /
  # _USER_OBJECT_CLASSES (comma-separated).
  manage_enabled: false
  people_base_dn: ""                      # parent DN for new entries; empty => base_dn
  rdn_attr: ""                            # naming attribute for new entries; empty => attr_username (uid)
  user_object_classes: []                 # objectClasses on create; empty => [top, person, organizationalPerson, inetOrgPerson]

logging:
  # Verbosity knobs apply to stdout AND omnilog, even when shipping is disabled.
  # These two SEED the live, admin-editable settings (Admin -> Settings -> System
  # -> Logging), which can change them without a restart once the app is running.
  # level: minimum level — debug | info | warn | error (OMNI_LOG_LEVEL).
  # http_requests: per-request access logging — all | errors | off
  #   (OMNI_LOG_HTTP_REQUESTS). Default "errors" logs only 4xx/5xx, so routine
  #   successful traffic doesn't flood the logs. Use "all" for a full access log.
  level: info
  http_requests: errors
  # Optional: ship structured logs to an omnilog server (in addition to stdout).
  # Non-blocking and best-effort — log delivery never slows or fails requests.
  # The api_key is a secret: config/env only, never the web-editable settings.
  # Also OMNI_LOGGING_ENABLED / _URL / _API_KEY / _SERVICE.
  enabled: false
  url: ""                                 # omnilog base URL, e.g. http://host:8080
  api_key: ""                             # SECRET
  service: omni-identity                  # source name reported to omnilog
