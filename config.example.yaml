# Omni Identity configuration.
# Copy to config.yaml and adjust. Any value can be overridden by an environment
# variable, e.g. OMNI_SERVER_PORT, OMNI_DATABASE_PATH, OMNI_SECURITY_ISSUER,
# OMNI_COOKIES_SECURE.

server:
  host: 0.0.0.0
  port: 8080
  # Public base URL clients use to reach this server. Required.
  public_url: https://identity.omni.local

database:
  # driver: sqlite (default, single-binary) or postgres (HA / multi-instance).
  driver: sqlite
  # SQLite database file (used when driver = sqlite).
  path: ./omni-identity.db
  # Postgres connection URL (used when driver = postgres), e.g.
  #   postgres://user:pass@db-host:5432/omni?sslmode=require
  # Or set OMNI_DATABASE_DRIVER=postgres and OMNI_DATABASE_URL=...
  url: ""

security:
  # Defaults to public_url if omitted.
  issuer: https://identity.omni.local
  token_ttl: 15m
  refresh_token_ttl: 720h
  # Account protection.
  max_failed_logins: 5
  lockout_duration: 15m
  password_min_length: 12
  # session_idle_timeout: 30m   # 0/unset disables idle expiry

cookies:
  # Set to false only for local http:// development.
  secure: true

smtp:
  # Optional. When host + from are set, self-service "Forgot password?" is
  # enabled on the login page. Credentials live here (config/env), never in the
  # web-editable settings. Also OMNI_SMTP_HOST / _PORT / _USERNAME / _PASSWORD /
  # _FROM / _STARTTLS.
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""
  starttls: true

ldap:
  # Optional LDAP / Active Directory authentication backend. When enabled, users
  # sign in on the hosted login page with their directory credentials; Omni binds
  # to verify them (search-then-bind) and just-in-time provisions a local mirror
  # account. Omni's TOTP MFA still applies to directory users who enroll it.
  # The bind password is a secret: it lives here (config/env) only, never in the
  # web-editable settings. All keys override via OMNI_LDAP_* env vars.
  enabled: false
  # Schema preset filling in standard filters/attributes: openldap | activedirectory.
  preset: openldap
  url: ldaps://dc1.example.com:636        # ldap:// or ldaps://
  start_tls: false                        # upgrade a ldap:// connection to TLS
  # Service account used to search for the user entry. Empty => anonymous search.
  bind_dn: "cn=svc-omni,ou=svc,dc=example,dc=com"
  bind_password: ""                       # SECRET
  base_dn: "ou=people,dc=example,dc=com"
  # Members of this group become Omni admins (re-evaluated on each login). Empty
  # => no LDAP-granted admins.
  admin_group_dn: "cn=omni-admins,ou=groups,dc=example,dc=com"
  # Filters/attributes below default from the preset; set them only to override:
  user_filter: ""                         # must contain %s (the username)
  attr_username: ""
  attr_email: ""
  attr_display_name: ""
  group_filter: ""                        # %s = the user DN
  ca_cert_file: ""                        # PEM bundle for a private CA
  insecure_skip_verify: false             # labs only — never in production
  timeout: 10s

logging:
  # Optional: ship structured logs to an omnilog server (in addition to stdout).
  # Non-blocking and best-effort — log delivery never slows or fails requests.
  # The api_key is a secret: config/env only, never the web-editable settings.
  # Also OMNI_LOGGING_ENABLED / _URL / _API_KEY / _SERVICE.
  enabled: false
  url: ""                                 # omnilog base URL, e.g. http://host:8080
  api_key: ""                             # SECRET
  service: omni-identity                  # source name reported to omnilog
